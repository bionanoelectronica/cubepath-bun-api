<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter Minimal Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --glass: rgba(255, 255, 255, 0.8);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --border: #334155;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --glass: rgba(15, 23, 42, 0.8);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #718096;
      margin-top: 0.5rem;
    }

    .chat-box {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 300px;
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      font-size: 1rem;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      max-width: 85%;
      margin-bottom: 0.5rem;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      background-color: var(--accent);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.ai {
      background-color: var(--border);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    form {
      display: flex;
      gap: 0.75rem;
      position: sticky;
      bottom: 1rem;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button {
      padding: 0.75rem 1.5rem;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background-color: var(--accent-hover);
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      background-color: var(--border);
      color: #94a3b8;
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      background-color: currentColor;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>OpenRouter minimal API</h1>
      <p class="subtitle">Bun + OpenRouter Streaming</p>
    </header>

    <div class="chat-box" id="chat">
      <div class="message ai">¡Hola! Envíame un mensaje y verás cómo reacciono en tiempo real (streaming).</div>
    </div>

    <form id="chat-form">
      <input type="text" id="prompt" placeholder="Habla con la IA..." autocomplete="off" required>
      <button type="submit" id="submit-btn">Enviar</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('prompt');
    const chatContainer = document.getElementById('chat');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      // Add User Message
      appendMessage(text, 'user');
      input.value = '';
      btn.disabled = true;

      // Add AI temporary message
      const aiMessageEl = document.createElement('div');
      aiMessageEl.className = 'message ai';
      aiMessageEl.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
      chatContainer.appendChild(aiMessageEl);
      scrollToBottom();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
        });

        aiMessageEl.innerHTML = '';

        if (!response.ok) {
          const errorData = await response.json();
          aiMessageEl.textContent = `Error ${response.status}: ${errorData.error}`;
          throw new Error('API Error');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          aiMessageEl.textContent += chunk;
          scrollToBottom();
        }
      } catch (err) {
        if (!aiMessageEl.textContent) {
          aiMessageEl.textContent = 'Hubo un error de conexión.';
        }
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });

    function appendMessage(content, role) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = content;
      chatContainer.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  </script>
</body>
</html>
