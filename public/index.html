<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter Minimal Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --glass: rgba(255, 255, 255, 0.8);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --border: #334155;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --glass: rgba(15, 23, 42, 0.8);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, var(--accent), #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #718096;
      margin-top: 0.5rem;
    }

    .chat-box {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 300px;
      max-height: 60vh;
      overflow-y: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      font-size: 1rem;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      max-width: 85%;
      margin-bottom: 0.5rem;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      background-color: var(--accent);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.ai {
      background-color: var(--border);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    form {
      display: flex;
      gap: 0.75rem;
      position: sticky;
      bottom: 1rem;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button {
      padding: 0.75rem 1.5rem;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background-color: var(--accent-hover);
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      background-color: var(--border);
      color: #94a3b8;
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      background-color: currentColor;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>OpenRouter minimal API</h1>
      <p class="subtitle">Bun + OpenRouter Streaming</p>
    </header>

    <div class="chat-box" id="chat">
      <div class="message ai">¡Hola! Envíame un mensaje y verás cómo reacciono en tiempo real (streaming).</div>
    </div>

    <form id="chat-form" style="display: flex; flex-wrap: wrap; gap: 0.75rem; position: sticky; bottom: 1rem; background: var(--glass); backdrop-filter: blur(10px); padding: 1rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);">
      <input type="text" id="chat-user" placeholder="Tu usuario" value="ana" required style="flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); min-width: 150px;">
      <input type="email" id="chat-email" placeholder="Tu email" value="ana@mail.com" required style="flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); min-width: 150px;">
      <input type="text" id="prompt" placeholder="Habla con la IA..." autocomplete="off" required style="flex: 1 1 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg); color: var(--text);">
      <button type="submit" id="submit-btn" style="flex: 1 1 100%;">Enviar Consulta a la IA</button>
    </form>

    <div class="chat-box" style="min-height: auto; max-height: none; overflow: visible; padding: 1.5rem; margin-top: 1rem; background: #1a1b26; color: #a9b1d6; border-color: #24283b;">
      <h2 style="margin-top: 0; font-size: 1.2rem; color: #fff;">REST rápido</h2>
      <p style="font-size: 0.9rem; color: #7aa2f7; margin-bottom: 1.5rem;">Ejecuta cualquier endpoint REST y visualiza el resultado.</p>
      
      <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
        <div>
          <label style="display: block; font-size: 0.85rem; margin-bottom: 0.3rem;">Metodo</label>
          <select id="rest-method" style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid #414868; background: #24283b; color: #fff; font-size: 0.9rem;">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
        </div>
        <div>
          <label style="display: block; font-size: 0.85rem; margin-bottom: 0.3rem;">Ruta</label>
          <input type="text" id="rest-route" value="/api/users" style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid #414868; background: #0f111a; color: #fff; font-size: 0.9rem; box-sizing: border-box;">
        </div>
        <div>
          <label style="display: block; font-size: 0.85rem; margin-bottom: 0.3rem;">Body JSON (opcional para GET/DELETE)</label>
          <textarea id="rest-body" rows="4" style="width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid #414868; background: #0f111a; color: #fff; font-family: monospace; font-size: 0.9rem; box-sizing: border-box;">{"username":"ana","email":"ana@mail.com"}</textarea>
        </div>
        <button id="rest-execute" style="width: 100%; background: #60a5fa; color: #000; padding: 0.8rem; font-weight: bold; font-size: 1rem; border-radius: 8px;">Ejecutar request</button>
      </div>

      <div style="display: flex; gap: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; padding-bottom: 0.5rem; flex-wrap: wrap;">
        <button class="rest-shortcut" data-method="GET" data-route="/api/users" data-body="" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #24283b; color: #c0caf5; white-space: nowrap; border: 1px solid #414868; border-radius: 6px; cursor: pointer;">GET /api/users</button>
        <button class="rest-shortcut" data-method="POST" data-route="/api/users" data-body='{"username":"ana","email":"ana@mail.com"}' style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #24283b; color: #c0caf5; white-space: nowrap; border: 1px solid #414868; border-radius: 6px; cursor: pointer;">POST /api/users</button>
        <button class="rest-shortcut" data-method="GET" data-route="/api/conversations" data-body="" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #24283b; color: #c0caf5; white-space: nowrap; border: 1px solid #414868; border-radius: 6px; cursor: pointer;">GET /api/conversations</button>
        <button class="rest-shortcut" data-method="POST" data-route="/api/conversations" data-body="" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #24283b; color: #c0caf5; white-space: nowrap; border: 1px solid #414868; border-radius: 6px; cursor: pointer;">POST /api/conversations</button>
        <button class="rest-shortcut" data-method="GET" data-route="/api/messages/1" data-body="" style="padding: 0.5rem 0.8rem; font-size: 0.85rem; background: #24283b; color: #c0caf5; white-space: nowrap; border: 1px solid #414868; border-radius: 6px; cursor: pointer;">GET /api/messages/:id</button>
      </div>

      <pre id="rest-result" style="background: #0f111a; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.9rem; margin: 0; color: #9ece6a; min-height: 80px;">Esperando request REST...</pre>
    </div>
  </div>

  <script>
    const methodEl = document.getElementById('rest-method');
    const routeEl = document.getElementById('rest-route');
    const bodyEl = document.getElementById('rest-body');
    const executeBtn = document.getElementById('rest-execute');
    const resultEl = document.getElementById('rest-result');

    document.querySelectorAll('.rest-shortcut').forEach(btn => {
      btn.addEventListener('click', () => {
        methodEl.value = btn.dataset.method;
        routeEl.value = btn.dataset.route;
        bodyEl.value = btn.dataset.body;
        executeBtn.click();
      });
    });

    executeBtn.addEventListener('click', async () => {
      resultEl.textContent = 'Loading...';
      try {
        const method = methodEl.value;
        const options = { method, headers: {} };
        const bodyStr = bodyEl.value.trim();
        
        if (bodyStr && method !== 'GET' && method !== 'DELETE') {
          options.headers['Content-Type'] = 'application/json';
          JSON.parse(bodyStr);
          options.body = bodyStr;
        }

        const res = await fetch(routeEl.value, options);
        if (res.status === 204) {
          resultEl.textContent = `Status: 204 No Content\\n(Success)`;
          return;
        }
        const text = await res.text();
        try {
          const json = JSON.parse(text);
          resultEl.textContent = `Status: ${res.status}\\n\\n` + JSON.stringify(json, null, 2);
        } catch(e) {
          resultEl.textContent = `Status: ${res.status}\\n\\n` + text;
        }
      } catch(err) {
        resultEl.textContent = 'Error: ' + err.message + (err instanceof SyntaxError ? '\\n(Verifica que el Body JSON sea válido)' : '');
      }
    });

    const form = document.getElementById('chat-form');
    const input = document.getElementById('prompt');
    const userInp = document.getElementById('chat-user');
    const emailInp = document.getElementById('chat-email');
    const chatContainer = document.getElementById('chat');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      const username = userInp.value.trim();
      const email = emailInp.value.trim();
      if (!text || !username || !email) return;

      // Add User Message
      appendMessage(text, 'user');
      input.value = '';
      btn.disabled = true;

      // Add AI temporary message
      const aiMessageEl = document.createElement('div');
      aiMessageEl.className = 'message ai';
      aiMessageEl.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
      chatContainer.appendChild(aiMessageEl);
      scrollToBottom();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            messages: [{ role: 'user', content: text }],
            user: { username, email }
          })
        });

        aiMessageEl.innerHTML = '';

        if (!response.ok) {
          const errorData = await response.json();
          aiMessageEl.textContent = `Error ${response.status}: ${errorData.error}`;
          throw new Error('API Error');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          aiMessageEl.textContent += chunk;
          scrollToBottom();
        }
      } catch (err) {
        if (!aiMessageEl.textContent) {
          aiMessageEl.textContent = 'Hubo un error de conexión.';
        }
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });

    function appendMessage(content, role) {
      const el = document.createElement('div');
      el.className = `message ${role}`;
      el.textContent = content;
      chatContainer.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  </script>
</body>
</html>
